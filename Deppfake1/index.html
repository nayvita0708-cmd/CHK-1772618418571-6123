<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Based Deepfake</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>

<div class="login-container">

<div class="logo">
<i class="fas fa-shield-alt"></i>
<span>Ai Based Deepfake Detection</span>
</div>

<h2>Welcome Back</h2>

<div class="subhead">
<i class="fas fa-fingerprint"></i>
<span>Authenticate to deepfake detection console</span>
</div>

<form>

<div class="input-group">
<label>Email / Username</label>
<input type="email" class="input-field"
placeholder="analyst@verivisor.ai">
</div>

<div class="input-group">
<label>Password</label>

<div class="password-wrapper">

<input type="password"
class="input-field"
placeholder="Enter password">

<i class="fas fa-eye-slash password-eye"></i>

</div>
</div>

<div class="forgot-row">
<a href="#forgot-modal" class="forgot-link">
<i class="fas fa-question-circle"></i>
Forgot Password?
</a>
</div>

<button class="login-btn">
<i class="fas fa-lock-open"></i>
Login
</button>

<div class="alt-options">
<div class="line"></div>
<span>or</span>
<div class="line"></div>
</div>

<div class="sso-hint">
<i class="fas fa-building"></i>
SSO via corporate IdP
</div>

<div class="register-text">
Don't have an account?
<a href="#">Request access</a>
</div>

</form>
</div>

</body>
</html>
